<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Guloi PDF</title>
    <meta
      name="description"
      content="Strumenti PDF, tutto in un'unica app: comprimi, unisci, dividi, ruota, estrai e proteggi i tuoi PDF nel browser."
    />
    <meta property="og:title" content="Guloi PDF" />
    <meta
      property="og:description"
      content="Strumenti PDF, tutto in un'unica app: comprimi, unisci, dividi, ruota, estrai e proteggi i tuoi PDF nel browser."
    />
    <meta property="og:type" content="website" />
    <script>
      // Set the theme BEFORE first paint to avoid a flash of the wrong theme.
      // Priority: explicit user choice in localStorage, else OS preference.
      (function () {
        try {
          var stored = localStorage.getItem("guloi-theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
